<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirector</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        
        /* Sidebar */
        #sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
        }

        #sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #999;
            display: block;
            border-bottom: 1px solid #222;
        }

        #sidebar a:hover { color: white; background: #222; }

        .closebtn { position: absolute; top: 10px; right: 20px; font-size: 30px; color: white; cursor: pointer; }

        /* Interface */
        .controls {
            background: #fff;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #ddd;
        }

        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px; }

        iframe { width: 100%; height: calc(100vh - 65px); border: none; background: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <span class="closebtn" onclick="toggleNav(0)">&times;</span>
    <div id="link-list"></div>
</div>

<div id="main-content">
    <div class="controls">
        <button onclick="toggleNav(250)">☰ Menu</button>
        <input type="text" id="urlInput" placeholder="Enter link (e.g. wikipedia.org)">
        <button onclick="loadFrame()">Load</button>
    </div>
    <iframe id="myFrame"></iframe>
</div>

<script>
    // 1. Fetch the JSON file and build the sidebar
    fetch('blocked_sites.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('link-list');
            data.links.forEach(item => {
                let a = document.createElement('a');
                a.href = item.url;
                a.target = "_blank"; // These sites block iframes, so we open new tabs
                a.innerText = item.name;
                list.appendChild(a);
            });
        })
        .catch(err => console.error("Could not find blocked_sites.json file. Make sure it's in the same folder."));

    // 2. Sidebar open/close
    function toggleNav(width) {
        document.getElementById("sidebar").style.width = width + "px";
        document.getElementById("main-content").style.marginLeft = width + "px";
    }

    // 3. Frame loading
    function loadFrame() {
        let val = document.getElementById('urlInput').value.trim();
        if (val) {
            if (!val.startsWith('http')) val = 'https://' + val;
            document.getElementById('myFrame').src = val;
        }
    }
</script>

</body>
</html>
