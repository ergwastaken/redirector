<!DOCTYPE html>
<html>
<head>
    <title>Redirector</title>
</head>
<body>

    <header>
        <h1>Web Redirector</h1>
        <p>Enter a URL below to view it in the frame or open it in a new window.</p>
        
        <nav>
            <!-- Using the 'size' attribute to make the input wider without CSS -->
            <input 
                type="text" 
                id="urlInput" 
                placeholder="https://example.com" 
                size="60"
                onkeydown="if(event.key==='Enter') loadFrame()"
            >
            <button onclick="loadFrame()"><strong>Load in Frame</strong></button>
            <button onclick="openExternal()">Open New Tab</button>
        </nav>
    </header>

    <br>
    <hr>
    <br>

    <main>
        <iframe 
            id="myFrame" 
            src="about:blank" 
            width="100%" 
            height="600px" 
            title="Content Frame"
        ></iframe>
    </main>

    <br>
    <hr>

    <footer>
        <p>
            <small>
                <strong>Status:</strong> Use 'New Tab' if the site refuses to load in the frame due to security headers.
            </small>
        </p>
        <p>&copy; 2024 Redirector Tool</p>
    </footer>

    <script>
        function getCleanUrl() {
            let val = document.getElementById('urlInput').value.trim();
            if (!val) return null;
            if (!val.startsWith('http://') && !val.startsWith('https://')) {
                val = 'https://' + val;
            }
            return val;
        }

        function loadFrame() {
            const url = getCleanUrl();
            if (url) {
                document.getElementById('myFrame').src = url;
            }
        }

        function openExternal() {
            const url = getCleanUrl();
            if (url) {
                window.open(url, '_blank');
            }
        }
    </script>

</body>
</html>
