<!DOCTYPE html>
<html>
<head>
    <title>Redirector by erg</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background: #111; 
        }

        /* Main Area */
        #main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #fff; 
        }

        .top-nav { 
            padding: 8px; 
            display: flex; 
            gap: 8px; 
            background: #222; 
            border-bottom: 1px solid #000; 
        }

        .top-nav input { 
            flex: 1; 
            padding: 8px; 
            background: #333; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px; 
            outline: none;
        }
        
        .top-nav input:focus {
            border-color: #666;
        }

        .top-nav button { 
            padding: 6px 16px; 
            background: #444; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 13px; 
            transition: background 0.2s;
        }

        .top-nav button:hover { 
            background: #555; 
        }

        .top-nav button.secondary { 
            background: #0066cc; 
        }

        .top-nav button.secondary:hover { 
            background: #0052a3; 
        }

        iframe { 
            flex: 1; 
            border: none; 
            width: 100%; 
            height: 100%; 
            background: white; 
        }
    </style>
</head>
<body>

<div id="main">
    <div class="top-nav">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g. google.com)..." onkeydown="if(event.key==='Enter') loadFrame()">
        <button onclick="loadFrame()">Load In Frame</button>
        <button class="secondary" onclick="openExternal()">Open in New Tab</button>
    </div>
    <iframe id="myFrame" src="about:blank"></iframe>
</div>

<script>
    function getCleanUrl() {
        let val = document.getElementById('urlInput').value.trim();
        if (!val) return null;
        // Basic URL sanitization
        if (!val.startsWith('http://') && !val.startsWith('https://')) {
            val = 'https://' + val;
        }
        return val;
    }

    function loadFrame() {
        const url = getCleanUrl();
        if (url) {
            document.getElementById('myFrame').src = url;
        }
    }

    function openExternal() {
        const url = getCleanUrl();
        if (url) {
            window.open(url, '_blank');
        }
    }
</script>

</body>
</html>
