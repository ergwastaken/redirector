<!DOCTYPE html>
<html lang="en">
<body>
  <script>
  function go() {
    let input = document.getElementById('url').value;
    // This part makes sure it's a valid web address
    if (!input.startsWith('http')) {
      input = 'https://' + input;
    }
    window.location.href = input;
  }
</script>
</body>
