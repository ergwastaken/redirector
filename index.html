<!DOCTYPE html>
<html>
<head>
    <title>Redirector by erg</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: #111; }
        
        /* Sidebar - Compact & Dark */
        #sidebar { width: 260px; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #333; transition: 0.3s; }
        .search-box { padding: 10px; border-bottom: 1px solid #333; }
        .search-box input { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        
        #link-list { flex: 1; overflow-y: auto; }
        #link-list a { display: block; padding: 8px 15px; color: #bbb; text-decoration: none; font-size: 13px; border-bottom: 1px solid #222; transition: 0.2s; }
        #link-list a:hover { background: #333; color: #fff; }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .top-nav { padding: 8px; display: flex; gap: 8px; background: #222; border-bottom: 1px solid #000; }
        .top-nav input { flex: 1; padding: 6px; background: #333; border: 1px solid #444; color: white; border-radius: 3px; }
        .top-nav button { padding: 6px 12px; background: #444; color: white; border: none; cursor: pointer; border-radius: 3px; }
        .top-nav button:hover { background: #555; }

        iframe { flex: 1; border: none; width: 100%; height: 100%; background: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="search-box">
        <input type="text" id="sidebarSearch" placeholder="Search unopenable links" onkeyup="filterLinks()">
    </div>
    <div id="link-list">
        </div>
</div>

<div id="main">
    <div class="top-nav">
        <input type="text" id="urlInput" placeholder="Enter URL to load in frame...">
        <button onclick="loadFrame()">Load</button>
    </div>
    <iframe id="myFrame" src="about:blank"></iframe>
</div>

<script>
    let allLinks = [];

    // Load the 100+ links from JSON
    fetch('links.json')
        .then(res => res.json())
        .then(data => {
            allLinks = data.links;
            renderLinks(allLinks);
        });

    function renderLinks(links) {
        const list = document.getElementById('link-list');
        list.innerHTML = '';
        links.forEach(item => {
            let a = document.createElement('a');
            a.href = item.url;
            a.target = "_blank"; // Opens external tab to avoid frame errors
            a.innerText = item.name;
            list.appendChild(a);
        });
    }

    function filterLinks() {
        const query = document.getElementById('sidebarSearch').value.toLowerCase();
        const filtered = allLinks.filter(l => l.name.toLowerCase().includes(query));
        renderLinks(filtered);
    }

    function loadFrame() {
        let val = document.getElementById('urlInput').value.trim();
        if (val) {
            if (!val.startsWith('http')) val = 'https://' + val;
            document.getElementById('myFrame').src = val;
        }
    }
</script>

</body>
</html>
