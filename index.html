<!DOCTYPE html>
<html>
<head>
    <title>Iframe Browser with Sidebar</title>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* The Sidebar */
        #sidebar {
            height: 100%;
            width: 0; /* Starts closed */
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        #sidebar a {
            padding: 10px 15px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
            cursor: pointer;
        }

        #sidebar a:hover { color: #f1f1f1; }

        #sidebar .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        /* Main Content Area */
        #main {
            transition: margin-left .5s;
            padding: 16px;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 100px);
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <p style="color:white; padding-left:15px;">Works in Frame:</p>
    <a onclick="loadInFrame('https://www.wikipedia.org')">Wikipedia</a>
    <a onclick="loadInFrame('https://www.bing.com')">Bing</a>
    
    <p style="color:white; padding-left:15px; margin-top:20px;">Opens in New Tab:</p>
    <a href="https://www.google.com" target="_blank">Google</a>
    <a href="https://www.youtube.com" target="_blank">YouTube</a>
    <a href="https://www.amazon.com" target="_blank">Amazon</a>
</div>

<div id="main">
    <button onclick="openNav()">&#9776; Open Links</button>
    <input type="text" id="urlInput" placeholder="Enter URL...">
    <button onclick="manualLoad()">Go</button>
    <br><br>
    <iframe id="displayFrame" src=""></iframe>
</div>

<script>
    // Sidebar Controls
    function openNav() {
        document.getElementById("sidebar").style.width = "250px";
        document.getElementById("main").style.marginLeft = "250px";
    }

    function closeNav() {
        document.getElementById("sidebar").style.width = "0";
        document.getElementById("main").style.marginLeft= "0";
    }

    // Loading Logic
    function loadInFrame(url) {
        document.getElementById('displayFrame').src = url;
        closeNav(); // Close sidebar after clicking
    }

    function manualLoad() {
        var url = document.getElementById('urlInput').value;
        if (url !== "") {
            if (!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('displayFrame').src = url;
        }
    }
</script>

</body>
</html>
