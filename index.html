<!DOCTYPE html>
<html>
<body>

    <input type="text" id="urlInput" placeholder="Paste link here...">
    <button onclick="loadPage()">Load into Frame</button>

    <br><br>

    <iframe id="displayFrame" width="100%" height="500px" src=""></iframe>

    <script>
        function loadPage() {
            var url = document.getElementById('urlInput').value;

            if (url !== "") {
                // Add https:// if missing
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }

                // Change the iframe source to the new URL
                document.getElementById('displayFrame').src = url;
            }
        }
    </script>

</body>
</html>
